<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContextLens</title>
    <script src="../../theme-boot.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { min-height: 100%; background: #111113; color-scheme: dark; }
      html[data-theme="light"] { background: #fff; color-scheme: light; }
      body { min-height: 100vh; background: #111113; color: #e8e6e2; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      html[data-theme="light"] body { background: #fff; color: #37352f; }
      #root { min-height: 100vh; background: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./chat.tsx"></script>
  </body>
</html>
